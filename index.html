<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación XV Años</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #8B0000;
      padding: 50px;
    }
    .card {
      padding: 30px;
      max-width: 600px;
      margin: 0;
    }
    .countdown {
      font-size: 2em;
      margin-top: 30px;
      font-weight: bold;
      color: gold;
    }
    .boton {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 25px;
      font-size: 1.1em;
      color: #8B0000;
      background: gold;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    .boton:hover {
      background: #ffd700;
      transform: scale(1.05);
    }
  </style>
   <!-- Contador -->
  <div class="countdown" id="countdown"></div>
</head>
<body>

<div class="card">

  <!-- Invitación Canva -->

<div style="position: relative; width: 100%; height: 0; padding-top: 112.5000%;
 padding-bottom: 0; box-shadow: 0 2px 8px 0 rgba(63,69,81,0.16); margin-top: 1.6em; margin-bottom: 0.9em; overflow: hidden;
 border-radius: 8px; will-change: transform;">
  <iframe loading="lazy" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; border: none; padding: 0;margin: 0;"
    src="https://www.canva.com/design/DAHIEce6_4E/oucA17BVqlrDBbxpIbbxGg/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
  </iframe>
</div>
<a href="https:&#x2F;&#x2F;www.canva.com&#x2F;design&#x2F;DAHIEce6_4E&#x2F;oucA17BVqlrDBbxpIbbxGg&#x2F;view?utm_content=DAHIEce6_4E&amp;utm_campaign=designshare&amp;utm_medium=embeds&amp;utm_source=link" target="_blank" rel="noopener">Madrina de Bendicion: Sonia Alejandra Milla Guerrero. Mi Madrina: Ileana Kristell Carrera López.</a> de kristel cano

  <!-- Botón ubicación -->
  <a class="boton" href="https://maps.app.goo.gl/aKfjdymTUuc8uqai7" target="_blank">
    📍 Ver ubicación del evento
  </a>

</div>

<script>
  const eventDate = new Date("May 23, 2026 20:00:00").getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const distance = eventDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
      days + " días " + hours + " horas " + minutes + " min " + seconds + " seg";

    if (distance < 0) {
      document.getElementById("countdown").innerHTML = "¡El evento ha comenzado!";
    }
  }, 1000);
</script>

</body>
</html>
